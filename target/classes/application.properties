server.port=8081

# Configuração para o Modelo de Chat (Phi-3)
langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=phi3

# Verifique se o prefixo está exatamente assim:
langchain4j.ollama.embedding-model.base-url=http://localhost:11434
langchain4j.ollama.embedding-model.model-name=all-minilm

# Timeout (Opcional, mas recomendado para evitar novos erros)
langchain4j.ollama.chat-model.timeout=PT60S